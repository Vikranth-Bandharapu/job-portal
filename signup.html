<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - JobPortal</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f3460,#1b4fa1);
  overflow:hidden;
}

/* BACKGROUND GLOW */
body::before, body::after{
  content:'';
  position:absolute;
  width:500px;
  height:500px;
  background: radial-gradient(circle,#00c6ff,transparent);
  animation: float 6s infinite alternate;
}

body::after{
  right:-150px;
  bottom:-150px;
  animation-duration:8s;
}

body::before{
  left:-150px;
  top:-150px;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(40px);}
}

/* CONTAINER */
.signup-container{
  position:relative;
  width:360px;
  padding:40px;
  border-radius:15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  color:#fff;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(50px);}
  to{opacity:1; transform:translateY(0);}
}

.signup-container h2{
  text-align:center;
  margin-bottom:30px;
}

/* INPUT */
.input-group{
  position:relative;
  margin-bottom:25px;
}

.input-group i{
  position:absolute;
  top:12px;
  left:0;
  color:#ccc;
}

.input-group input{
  width:100%;
  padding:12px 0 12px 25px;
  border:none;
  outline:none;
  background:transparent;
  border-bottom:2px solid #fff;
  color:#fff;
}

.input-group label{
  position:absolute;
  top:12px;
  left:25px;
  font-size:14px;
  color:#ccc;
  transition:0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label{
  top:-10px;
  font-size:12px;
  color:#00c6ff;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* ERROR */
.error{
  color:#ff6b6b;
  font-size:13px;
  margin-bottom:10px;
}

/* FOOTER */
.footer-text{
  margin-top:15px;
  text-align:center;
  font-size:14px;
}

.footer-text a{
  color:#00c6ff;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="signup-container">
<h2>Create Account</h2>

<form id="signupForm">

  <div class="input-group">
    <i class="fas fa-user"></i>
    <input type="text" id="name" required>
    <label>Full Name</label>
  </div>

  <div class="input-group">
    <i class="fas fa-envelope"></i>
    <input type="email" id="email" required>
    <label>Email</label>
  </div>

  <div class="input-group">
    <i class="fas fa-lock"></i>
    <input type="password" id="password" required>
    <label>Password</label>
  </div>

  <div id="error" class="error"></div>

  <button type="submit" class="btn">Signup</button>

</form>

<div class="footer-text">
Already have account? <a href="login.html">Login</a>
</div>

</div>
<script>
document.getElementById('signupForm').addEventListener('submit', function(e){
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorDiv = document.getElementById('error');

    if(!name){
        errorDiv.textContent = "Name cannot be empty!";
        return;
    }

    if(!email.endsWith('@gmail.com')){
        errorDiv.textContent = "Use @gmail.com email!";
        return;
    }

    if(password.length < 4){
        errorDiv.textContent = "Password must be 4+ characters!";
        return;
    }

    // ✅ SAVE DATA
    localStorage.setItem("user", JSON.stringify({
        name: name,
        email: email,
        password: password
    }));

    // ✅ REDIRECT
    window.location.href = "login.html";
});
</script>

</body>
</html>
