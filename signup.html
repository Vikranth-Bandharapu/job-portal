<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>
body{
font-family:Arial;
background:#f4f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.form-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#0f3460;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
.back-btn{
position:absolute;
top:20px;
left:20px;
padding:8px 15px;
background:#0f3460;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
width:auto;   /* ✅ fix full width issue */
}
</style>
</head>

<body>
<button onclick="goBack()" class="back-btn">← Back</button>
<div class="form-box">
<h2>Signup</h2>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<p id="emailError" style="color:red; font-size:14px;"></p>
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>
function signup(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

// Gmail validation
let gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

// ❌ If invalid email
if(!gmailPattern.test(email)){
  alert("Please enter valid Gmail (example@gmail.com)");
  return;
}

// ❌ Empty fields check
if(name === "" || password === ""){
  alert("All fields are required");
  return;
}

// ✅ Save user (optional)
let user = {name,email,password};
localStorage.setItem("user", JSON.stringify(user));

// ✅ Redirect to 404
window.location.href = "404.html";

}

function goBack(){
  window.history.back();
}
</script>

</body>
</html>
