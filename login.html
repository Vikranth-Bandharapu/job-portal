<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - JobPortal</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin:0; padding:0; font-family: 'Roboto', sans-serif; }
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f3460, #1b4fa1);
    }
    .login-container {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 350px;
        text-align: center;
    }
    .login-container h2 {
        margin-bottom: 25px;
        color: #0f3460;
    }
    .input-group {
        position: relative;
        margin-bottom: 20px;
    }
    .input-group i {
        position: absolute;
        top: 12px;
        left: 10px;
        color: #0f3460;
    }
    input {
        width: 100%;
        padding: 12px 12px 12px 35px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 14px;
    }
    input:focus { border-color: #1b4fa1; }
    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #1b4fa1;
        color: #fff;
        font-weight: 500;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn:hover { background: #0f3460; }
    .error { color: red; font-size: 13px; margin-bottom: 10px; text-align: left; }
    .footer-text { margin-top: 15px; font-size: 14px; color: #555; }
    .footer-text a { color: #1b4fa1; text-decoration: none; }
    .footer-text a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-container">
    <h2>Login to JobPortal</h2>
    <form id="loginForm">
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <div id="error" class="error"></div>
        <button type="submit" class="btn">Login</button>
    </form>
    <div class="footer-text">
        Don't have an account? <a href="signup.html">Signup</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorDiv = document.getElementById('error');

    if(!email.endsWith('@gmail.com')){
        errorDiv.textContent = "Email must be a @gmail.com address!";
        return;
    }

    if(password.length < 4){
        errorDiv.textContent = "Password must be at least 4 characters!";
        return;
    }

    // Success
    window.location.href = "404.html";
});
</script>

</body>
</html>
