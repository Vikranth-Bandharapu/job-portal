<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stackly</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="footer.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <a href="login.html"><img src="images/white-logo.webp" alt="Stackly Logo"></a>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="company.html">Companies</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
      <div class="hamburger"><i class="fas fa-bars"></i></div>
    </nav>
  </header>

  <!-- Login Form -->
  <section class="login-section">
    <div class="login-container">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="loginEmail" placeholder="Email" required>
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" placeholder="Password" required>
        </div>
        <button type="submit" class="btn">Login</button>
        <p id="loginError" style="color:red; margin-top:10px;"></p>
      </form>
      <p class="forgot"><a href="forgot-password.html">Forgot Password?</a></p>
      <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </section>

  <footer>
    &copy; 2026 Stackly. All rights reserved.
    <a href="#">Privacy</a> | 
    <a href="#">Terms</a>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
