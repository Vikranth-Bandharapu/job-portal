<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
font-family:Arial;
background:#f4f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.form-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#0f3460;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
font-size:14px;
}
.back-btn{
position:absolute;
top:20px;
left:20px;
padding:8px 15px;
background:#0f3460;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
width:auto;   /* ✅ fix full width issue */
}
</style>
</head>

<body>
  <button onclick="goBack()" class="back-btn">← Back</button>
<div class="form-box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<p><a href="404.html">Forgot Password?</a></p>
<button onclick="login()">Login</button>

<p>Don't have account? <a href="signup.html">Signup</a></p>
</div>

<script>
function login(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("No account found. Please signup.");
  return;
}

if(email === user.email && password === user.password){
  localStorage.setItem("loggedIn", "true");
 window.location.href = "404.html";
}else{
  alert("Invalid credentials");
}

}

function goBack(){
  window.history.back();
}
</script>

</body>
</html>
