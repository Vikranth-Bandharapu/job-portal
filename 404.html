<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found</title>

<style>
body{
font-family:Arial;
background:#f4f6fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
font-size:50px;
color:#e94560;
}

button{
margin-top:20px;
padding:10px 20px;
background:#0f3460;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>404</h1>
<p>Oops! Page not found</p>

<button onclick="goHome()">Go to Home</button>
</div>

<script>
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
