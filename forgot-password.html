<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPortal - Forgot Password</title>
  <link rel="stylesheet" href="style.css">
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>


  <!-- Forgot Password Form -->
  <section class="forgot-section">
    <div class="forgot-container">
      <h2>Forgot Password</h2>
      <p>Enter your email to reset your password</p>
      <form id="forgotForm">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your registered email" required>
        </div>
        <a href="404.html" class="btn reset-btn">Reset Password</a>
        <p>Remembered your password? <a href="login.html">Login</a></p>
      </form>
    </div>
  </section>

 
  <script src="js/main.js"></script>
  <script src="js/forgot.js"></script>
</body>
</html>
