<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPortal - Home</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="footer.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
  <a href="index.html">
    <img src="images/white-logo.webp" alt="Stackly Logo">
  </a>
</div>
    </div>
    <nav>
      <ul class="nav-links">
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="company.html">Companies</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
      <div class="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </nav>
  </header>

  <!-- Hero / Job Search -->
  <section class="hero">
    <h1>Find Your Dream Job</h1>
    <div class="search-bar">
      <input type="text" placeholder="Job title or keywords">
      <input type="text" placeholder="Location">
      <button>Search</button>
    </div>
  </section>

  <!-- Featured Jobs -->
  <section class="featured-jobs">
    <h2>Featured Jobs</h2>
    <div class="job-cards">
      <div class="job-card">
        <h3>Frontend Developer</h3>
        <p>Google - Bangalore</p>
        <span>Full Time</span>
      </div>
      <div class="job-card">
        <h3>Backend Developer</h3>
        <p>Amazon - Hyderabad</p>
        <span>Full Time</span>
      </div>
      <div class="job-card">
        <h3>UI/UX Designer</h3>
        <p>Microsoft - Mumbai</p>
        <span>Part Time</span>
      </div>
    </div>
  </section>

  <!-- Companies -->
  <section class="companies">
    <h2>Top Companies</h2>
    <div class="company-logos">
      <img src="images/google_PNG102344 (1).webp" alt="Google">
      <img src="./images/download (5).webp" alt="Amazon">
      <img src="./images/download (3).webp" alt="Microsoft">
      <img src="images/download (4).webp" alt="Facebook">
    </div>
  </section>
